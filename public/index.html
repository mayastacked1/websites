<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyAI - Your Free AI Study Partner</title>
    
    <link rel="icon" type="image/png" href="logo(1).png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { bg: '#0f172a', surface: '#1e293b', border: '#334155' },
                        gpt: { bg: '#ffffff', surface: '#f7f7f8', border: '#e5e5e5', borderDark: '#565869' }
                    },
                    fontFamily: { sans: ['Inter', 'Söhne', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-in-left': 'slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'modal-in': 'modalIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        slideInRight: { '0%': { opacity: 0, transform: 'translateX(20px) scale(0.95)' }, '100%': { opacity: 1, transform: 'translateX(0) scale(1)' } },
                        slideInLeft: { '0%': { opacity: 0, transform: 'translateX(-20px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } },
                        modalIn: { '0%': { opacity: 0, transform: 'scale(0.95) translateY(10px)' }, '100%': { opacity: 1, transform: 'scale(1) translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body, aside, main, header, button, textarea, .prose-content, .chat-bubble { transition: background-color 0.4s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        .cursor-blink::after { content: '▋'; display: inline-block; vertical-align: middle; margin-left: 2px; animation: blink 1s step-start infinite; color: currentColor; }
        @keyframes blink { 50% { opacity: 0; } }

        .thinking-dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #94a3b8; margin: 0 3px; animation: bounce 1.4s infinite ease-in-out both; }
        .dark .thinking-dots span { background-color: #64748b; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .glass-header { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .dark .glass-header { 
            background: rgba(52, 53, 65, 0.75); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .prose-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .prose-content p:last-child { margin-bottom: 0; }
        .prose-content strong { font-weight: 600; color: inherit; }
        .prose-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .prose-content li { margin-bottom: 0.25rem; }
        .prose-content code { background: rgba(0,0,0,0.06); color: #eb5757; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: 'Menlo', monospace; word-break: break-all; }
        .dark .prose-content code { background: rgba(255,255,255,0.15); color: #ff6b6b; }
        .prose-content pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75rem; }
        .prose-content pre code { background: transparent; color: inherit; padding: 0; font-size: 0.9em; word-break: normal; white-space: pre; }
        .prose-content blockquote { border-left: 4px solid #cbd5e1; padding-left: 1rem; color: #64748b; font-style: italic; }
        .dark .prose-content blockquote { border-left-color: #475569; color: #94a3b8; }

        .btn-glow { transition: all 0.2s ease; }
        .btn-glow:hover:not(:disabled) { box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25); transform: translateY(-1px); }
        .btn-glow:active:not(:disabled) { transform: translateY(0px) scale(0.98); }
        
        .mode-toggle svg { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .mode-toggle:hover svg { transform: rotate(30deg); }
        
        .history-item { transition: all 0.2s ease; }
        .history-item:hover { background-color: rgba(0, 0, 0, 0.04); }
        .dark .history-item:hover { background-color: rgba(255, 255, 255, 0.05); }
        
        .deleting { 
            animation: deleteAnim 0.3s forwards cubic-bezier(0.4, 0, 1, 1); 
            pointer-events: none; 
        }
        @keyframes deleteAnim {
            0% { opacity: 1; transform: translateX(0); max-height: 50px; }
            50% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin-top: 0; margin-bottom: 0; border-width: 0; }
        }
        
        .input-ring { transition: all 0.2s ease; }
        .input-ring:focus-within { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); border-color: rgba(59, 130, 246, 0.5); }

        .logo-hover { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 0px rgba(59, 130, 246, 0); }
        .logo-hover:hover { transform: rotate(-10deg) scale(1.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }

        #loading-screen { position: fixed; inset: 0; z-index: 9999; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .dark #loading-screen { background-color: #343541; }
        #loading-screen.hidden-loader { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-wrapper { position: relative; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .loader-logo { width: 24px; height: 24px; border-radius: 6px; object-fit: cover; }
        .loader-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #3b82f6; border-right-color: #8b5cf6; animation: spin 0.8s linear infinite; }
        .dark .loader-ring { border-top-color: #60a5fa; border-right-color: #a78bfa; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease-out; }
        .faq-answer.open { max-height: 200px; }
        .faq-icon { transition: transform 0.3s ease; }
        .faq-icon.open { transform: rotate(45deg); }

        .app-modal:not(.hidden) { opacity: 1; visibility: visible; pointer-events: auto; }

        .msg-action-btn.active-feedback { color: #2563eb; }
        .dark .msg-action-btn.active-feedback { color: #60a5fa; }
    </style>
</head>

    <!-- JAVASCRIPT FOR LOGIN -->
    <script>
        // Check if user is already logged in
        if (localStorage.getItem('studyai_verified') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
        }

        async function sendVerificationCode() {
            const email = document.getElementById('login-email').value;
            const errorDiv = document.getElementById('login-error-1');
            
            if (!email) {
                errorDiv.textContent = "Please enter an email.";
                errorDiv.classList.remove('hidden');
                return;
            }

            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('login-step-1').classList.add('hidden');
                    document.getElementById('login-step-2').classList.remove('hidden');
                    document.getElementById('email-display').textContent = email;
                } else {
                    errorDiv.textContent = data.error || "Failed to send email.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = "Cannot connect to server.";
                errorDiv.classList.remove('hidden');
            }
        }

        async function verifyTheCode() {
            const email = document.getElementById('login-email').value;
            const code = document.getElementById('login-code').value;
            const errorDiv = document.getElementById('login-error-2');

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('studyai_verified', 'true');
                    document.getElementById('login-overlay').style.display = 'none';
                } else {
                    errorDiv.textContent = data.error || "Invalid code.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = "Cannot connect to server.";
                errorDiv.classList.remove('hidden');
            }
        }
    </script>

    <!-- STUDY AI MAIN SCRIPT -->
    <script>
        let conversationHistory = [];
        let currentChatId = Date.now().toString();
        let attachedFile = null;
        
        let chats = {};

        try {
